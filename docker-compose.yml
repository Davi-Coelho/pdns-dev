services:
  db:
    image: postgres:16-alpine
    container_name: pdns-db
    environment:
      - POSTGRES_DB=pdns
      - POSTGRES_USER=pdns
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - internal

  pdns:
    image: powerdns/pdns-auth-master
    container_name: pdns
    ports:
      - "53:53"
      - "53:53/udp"
    volumes:
      - ./pdns.conf:/etc/powerdns/pdns.conf:ro
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.pdns.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.pdns.entrypoints=websecure"
      - "traefik.http.routers.pdns.tls.certresolver=cloudflare"
      - "traefik.http.services.pdns.loadbalancer.server.port=8081"

  pdns-admin:
    image: powerdnsadmin/pda-legacy:latest
    container_name: pdns-admin
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=postgresql://pdns:${DB_PASSWORD}@db/pdns-admin
      - PDNS_STATS_URL=http://pdns:8081/
      - PDNS_API_KEY=${API_KEY}
      - PDNS_VERSION=4.9.0
    restart: unless-stopped
    depends_on:
      - db
      - pdns
    networks:
      - web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.pdns-admin.rule=Host(`${ADMIN_HOST}`)"
      - "traefik.http.routers.pdns-admin.entrypoints=websecure"
      - "traefik.http.routers.pdns-admin.tls.certresolver=cloudflare"
      - "traefik.http.services.pdns-admin.loadbalancer.server.port=80"

networks:
  web:
    external: true
  internal:
    driver: bridge
